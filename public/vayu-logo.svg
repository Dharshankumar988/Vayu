<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="left-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="right-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Right leg of the V (Darker Blue, goes behind) -->
    <path d="M168 50 L115 180 L135 210 L210 50 Z" fill="url(#right-gradient)" />
    <!-- Left leg of the V (Lighter Blue, overlaps) -->
    <path d="M45 50 L140 195 L115 210 L80 140 L105 100 L95 80 L35 50 Z" fill="url(#left-gradient)" />
    
    <!-- Simplified overlapped shape for cleaner V look -->
    <path d="M45 60 C 65 60, 90 120, 128 190 L140 210 L150 190 C 180 120, 210 60, 215 60 L180 60 L128 150 L90 60 Z" fill="url(#left-gradient)" />
    <path d="M128 150 L150 190 C 180 120, 210 60, 215 60 L180 60 Z" fill="url(#right-gradient)" />
  </g>
</svg>
